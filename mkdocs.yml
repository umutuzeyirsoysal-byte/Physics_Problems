              - Obwody: 'Twoje_rozwiazania/06_Circuits_solution/index.md'
              - Pomiary: 'Twoje_rozwiazania/07_Measurements_solution/index.md'
              - 'Astronomia i Astrofizyka': 'Twoje_rozwiazania/08_Astronomy_and_Astrophysics_solution/index.md'
