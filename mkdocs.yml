site_name: Physics Problems
site_url: https://nowitends.github.io/Physics_Problems

theme:
  name: material
  palette:
    # Palette toggle for light mode: other schemes include 'slate', 'material', 'indigo', 'red', 'pink' that  can be found at https://squidfunk.github.io/mkdocs-material/reference/palette/#built-in-color-schemes
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode: other schemes include 'slate', 'material', 'indigo', 'red', etc.
    - scheme: material
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/config.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - i18n:
      docs_structure: folder
      languages:
        - locale: pl
          name: Polski
          build: true
          nav:
            - Home: 'index.md'
            - Twoje Rozwiązania:
              - Wprowadzenie: 'Twoje_rozwiazania/00_Intro_solution/index.md'
              - 'Mechanika 1': 'Twoje_rozwiazania/01_Mechanics_1_solution/index.md'
              - 'Mechanika 2': 'Twoje_rozwiazania/02_Mechanics_2_solution/index.md'
              - Fale: 'Twoje_rozwiazania/03_Waves_solution/index.md'
